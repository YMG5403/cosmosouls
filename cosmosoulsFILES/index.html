<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMOSOULS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="settingsUI" class="hidden UI-layer">
        <div class="settings-box">
            <h2>НАСТРОЙКИ</h2>
            <label>Яркость: <input type="range" id="brightness" min="10" max="200" value="100"></label>
            <br><br>
            <label>Ограничение FPS: <input type="number" id="fpsLimit" min="10" max="144" value="60"></label>
            <br><br>
            <button id="backToMenu">НАЗАД</button>
        </div>
    </div>

    <div id="charCreationUI" class="hidden UI-layer">
        <div class="creation-box">
            <h2>НАРИСУЙ ЛИЦО ДУХУ</h2>
            <p>(Кликай пиксели внутри круга)</p>
            <canvas id="pixelCanvas" width="100" height="100"></canvas>
            <br>
            <button id="finishChar">ГОТОВО</button>
        </div>
    </div>

    <div id="brightnessOverlay"></div>

    <script src="game.js"></script>
</body>
</html>
