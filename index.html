<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle of the Grid - PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>

    <div id="app" class="glass-container">
        <header class="header">
            <div class="profile">
                <div class="avatar"></div>
                <div class="info">
                    <div id="player-name" class="name">Игрок</div>
                    <div class="trophies">🏆 <span id="val-trophies">0</span></div>
                </div>
            </div>
            <div class="economy">
                <div class="resource gold">🪙 <span id="val-gold">1000</span></div>
                <div class="resource gems">💎 <span id="val-gems">10</span></div>
            </div>
        </header>

        <main class="main-content">
            <section id="screen-shop" class="screen active">
                <h1 class="glow-text">Магазин</h1>
                <div class="gacha-boxes">
                    <div class="box silver" onclick="GameApp.buyBox('silver')">
                        <div class="box-icon">📦</div>
                        <h3>Серебряный</h3>
                        <p>800 🪙</p>
                    </div>
                    <div class="box gold" onclick="GameApp.buyBox('gold')">
                        <div class="box-icon glow">🎁</div>
                        <h3>Золотой</h3>
                        <p>5000 🪙</p>
                    </div>
                    <div class="box mega" onclick="GameApp.buyBox('mega')">
                        <div class="box-icon super-glow">💎</div>
                        <h3>МЕГА-ЯЩИК</h3>
                        <p>200 💎</p>
                    </div>
                </div>
                <div id="gacha-log" class="log-text"></div>
            </section>

            <section id="screen-battle" class="screen">
                <div class="arena-wrapper">
                    <div id="network-status" class="status-badge connecting">Подключение к серверу...</div>
                    
                    <canvas id="gameCanvas" width="1000" height="450"></canvas>
                    
                    <div class="hud">
                        <div class="deck-slots" id="deck-slots">
                            </div>
                        <div class="elixir-system">
                            <div class="elixir-bar">
                                <div id="elixir-fill" class="fill"></div>
                            </div>
                            <div id="elixir-val" class="elixir-text">0 / 25</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="navbar">
            <button class="nav-btn active" data-target="screen-shop" onclick="GameApp.navigate(this)">🏪 МАГАЗИН</button>
            <button class="nav-btn battle-btn" data-target="screen-battle" onclick="GameApp.navigate(this); GameApp.startMultiplayerSearch()">⚔️ В БОЙ</button>
        </nav>
    </div>

    <script src="game.js"></script>
</body>
</html>
